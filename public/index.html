<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QRCode Browser Free</title>

<style>

body{
margin:0;
padding:30px;
font-family:Arial,sans-serif;
background:#f3f4f6;
}

.container{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
max-width:1200px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.status{
font-weight:bold;
color:#374151;
}

.timer{
font-size:26px;
font-weight:bold;
color:#2563eb;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#111827;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #e5e7eb;
}

tr:nth-child(even){
background:#fafafa;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<h1>QRCode Browser Free</h1>
<p>Compatibile 100% Render Free</p>
</div>

<button id="syncBtn">
Sincronizza Ora
</button>

</div>

<div class="status" id="status">
Sistema pronto
</div>

<div class="timer" id="timer">
0s
</div>

<table>

<thead>
<tr>
<th>Matricola</th>
<th>Stato</th>
<th>Firmware</th>
<th>Ultimo Controllo</th>
</tr>
</thead>

<tbody>

<tr>
<td>1BENI051724</td>
<td>TRASMETTE I DATI ALL'AGENZIA</td>
<td>14.03.35</td>
<td>2026-05-12</td>
</tr>

</tbody>

</table>

</div>

<script>

const btn = document.getElementById("syncBtn");
const statusEl = document.getElementById("status");
const timerEl = document.getElementById("timer");

let interval = null;

btn.addEventListener("click", async () => {

const res = await fetch("/api/sync", {
method:"POST"
});

const data = await res.json();

statusEl.innerText = data.message;

clearInterval(interval);

interval = setInterval(async () => {

const s = await fetch("/api/status");
const state = await s.json();

timerEl.innerText =
state.syncSeconds + "s";

if(!state.syncRunning){

statusEl.innerText =
"Sincronizzazione completata";

clearInterval(interval);

}

},1000);

});

</script>

</body>
</html>
