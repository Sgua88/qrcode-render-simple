<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRCode Browser</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>QRCode Browser Online</h1>

<p>Deploy Render riuscito.</p>

<button onclick="checkStatus()">
Controlla Stato
</button>

<p id="status"></p>

</div>

<script>
async function checkStatus(){

const res = await fetch('/api/status');
const data = await res.json();

document.getElementById('status').innerText =
data.status;

}
</script>

</body>
</html>
