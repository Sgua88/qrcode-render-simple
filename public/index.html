<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QRCode Browser SQLite</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<h1>QRCode Browser</h1>
<p>Render Free + SQLite</p>
</div>

<input
id="search"
placeholder="Cerca matricola, P.IVA, stato..."
>

</div>

<div class="meta">
<span id="count">0 record</span>
</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Matricola</th>
<th>Stato</th>
<th>Ultima VP</th>
<th>Risultato VP</th>
<th>P.IVA VP</th>
<th>Ultima trasmissione</th>
<th>FW</th>
<th>P.IVA</th>
<th>Ultimo controllo</th>
<th>AE</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
