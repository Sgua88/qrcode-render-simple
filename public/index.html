<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QRCode Browser Optimized</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<h1>QRCode Browser</h1>
<p>Render Free ottimizzato • 7.900+ record</p>
</div>

<div class="actions">

<input
id="search"
placeholder="Cerca..."
>

<button id="syncBtn">
Aggiorna Controlli
</button>

</div>

</div>

<div class="status-box">

<div id="syncText">
Sistema pronto
</div>

<div id="timer">
0s
</div>

</div>

<div class="meta">

<span id="count">
0 record
</span>

<span id="pageInfo">
Pagina 1
</span>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Matricola</th>
<th>Stato</th>
<th>Ultima VP</th>
<th>Risultato VP</th>
<th>P.IVA VP</th>
<th>Ultima trasmissione</th>
<th>FW</th>
<th>P.IVA</th>
<th>Ultimo controllo</th>
<th>AE</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="pagination">

<button id="prevBtn">
Precedente
</button>

<button id="nextBtn">
Successivo
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
