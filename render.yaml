services:
  - type: web
    name: qrcode-browser-cloud
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: qrcode-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SYNC_CRON
        value: "0 1 * * *"
      - key: PUPPETEER_HEADLESS
        value: "true"
databases:
  - name: qrcode-postgres
    plan: free
